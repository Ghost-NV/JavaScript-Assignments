<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="Task-2.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Open+Sans:wght@400;700&family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="controls">
      <select id="fontSelector">
        <option value="'Open Sans', sans-serif">Open Sans</option>
        <option value="'Cairo', sans-serif">Cairo</option>
        <option value="'Roboto', sans-serif">Roboto</option>
      </select>

      <select id="colorSelector">
        <option value="#ff3333">Red</option>
        <option value="#33ff33">Green</option>
        <option value="#3333ff">Blue</option>
        <option value="#ffff33">Yellow</option>
        <option value="#ff33ff">Pink</option>
        <option value="#33ffff">Cyan</option>
      </select>

      <select id="sizeSelector">
        <option value="16px">16</option>
        <option value="18px">18</option>
        <option value="20px">20</option>
        <option value="22px">22</option>
        <option value="24px">24</option>
        <option value="26px">26</option>
        <option value="28px">28</option>
        <option value="30px">30</option>
      </select>
    </div>

    <div class="preview-box" id="previewBox">
      <h2>Welcome</h2>
      <p>Choose your font, color, and font size</p>
    </div>

    <script src="Task-2.JS"></script>
  </body>
</html>
